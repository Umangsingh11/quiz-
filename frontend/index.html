<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <h1 id="auth-title">Student Login</h1>
    <p id="error-msg" class="error-msg hidden"></p>

    <form id="auth-form">
      <input type="text" id="name" placeholder="Full Name" class="hidden" />
      <input type="email" id="email" placeholder="Email Address" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit" id="submit-btn">Login</button>
    </form>

    <p class="toggle-auth" id="toggle-auth-btn">Don't have an account? Register</p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
